<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <marker id="dn" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 5 9 L 10 0" fill="none" stroke="#6b7280" stroke-width="1.6"/>
    </marker>
  </defs>

  <rect width="760" height="560" fill="#ffffff"/>

  <!-- Title -->
  <text x="380" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2937">🦴 The Medallion Stack</text>
  <text x="380" y="64" text-anchor="middle" font-size="13" font-style="italic" fill="#6b7280">Three grades of the same underlying data</text>

  <!-- ingest hint -->
  <text x="380" y="100" text-anchor="middle" font-size="12" fill="#9ca3af">raw data in ↓</text>

  <!-- BRONZE -->
  <rect x="180" y="115" width="400" height="110" rx="12" fill="#fde9c8" stroke="#d97706" stroke-width="2.5"/>
  <text x="200" y="148" font-size="17" font-weight="700" fill="#92400e">🪨 BRONZE</text>
  <text x="200" y="172" font-size="12.5" fill="#7c2d12">Raw · Immutable · Append-only · Iceberg on S3</text>
  <text x="200" y="192" font-size="12.5" fill="#7c2d12">Partitioned by event_date · idempotent ingest</text>
  <text x="200" y="214" font-size="12" font-style="italic" fill="#b45309">“The insurance policy — re-derive anything from here”</text>

  <line x1="380" y1="225" x2="380" y2="258" stroke="#6b7280" stroke-width="1.6" marker-end="url(#dn)"/>
  <text x="396" y="247" font-size="11" font-style="italic" fill="#6b7280">dbt + quality gates</text>

  <!-- SILVER -->
  <rect x="180" y="260" width="400" height="110" rx="12" fill="#e7eaee" stroke="#6b7280" stroke-width="2.5"/>
  <text x="200" y="293" font-size="17" font-weight="700" fill="#374151">🪙 SILVER</text>
  <text x="200" y="317" font-size="12.5" fill="#374151">Cleaned · Deduped · Type-cast · Schema-enforced</text>
  <text x="200" y="337" font-size="12.5" fill="#374151">PII tokenized · Great Expectations gates</text>
  <text x="200" y="359" font-size="12" font-style="italic" fill="#4b5563">“The contract — vendor chaos stops here”</text>

  <line x1="380" y1="370" x2="380" y2="403" stroke="#6b7280" stroke-width="1.6" marker-end="url(#dn)"/>
  <text x="396" y="392" font-size="11" font-style="italic" fill="#6b7280">dbt + contracts</text>

  <!-- GOLD -->
  <rect x="180" y="405" width="400" height="110" rx="12" fill="#fdedb8" stroke="#ca8a04" stroke-width="2.5"/>
  <text x="200" y="438" font-size="17" font-weight="700" fill="#713f12">🏆 GOLD</text>
  <text x="200" y="462" font-size="12.5" fill="#713f12">Business marts · Aggregations · Definitions</text>
  <text x="200" y="482" font-size="12.5" fill="#713f12">Contract-versioned · shaped per consumer</text>
  <text x="200" y="504" font-size="12" font-style="italic" fill="#a16207">“The product — what BI &amp; ML actually query”</text>

  <!-- consumers hint -->
  <text x="380" y="545" text-anchor="middle" font-size="12" fill="#9ca3af">↓ business value out</text>
</svg>
