<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="-apple-system, system-ui, sans-serif">
  <rect width="760" height="420" fill="#ffffff"/>

  <text x="380" y="36" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2937">🐊 Swamp vs 🦴 Lake-With-a-Spine</text>
  <text x="380" y="58" text-anchor="middle" font-size="12.5" font-style="italic" fill="#6b7280">Same water. The difference is whether anything gives it a shape.</text>

  <!-- ===== SWAMP PANEL ===== -->
  <rect x="30" y="80" width="330" height="310" rx="14" fill="#eef3e6" stroke="#6b7c3f" stroke-width="2"/>
  <text x="195" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#3f5111">🐊 The Swamp</text>
  <text x="195" y="130" text-anchor="middle" font-size="11.5" font-style="italic" fill="#5e6b3a">raw files, no structure</text>

  <!-- scattered loose files -->
  <g fill="#cdd9b0" stroke="#6b7c3f" stroke-width="1.2">
    <rect x="70" y="155" width="44" height="30" rx="3" transform="rotate(-8 92 170)"/>
    <rect x="150" y="170" width="44" height="30" rx="3" transform="rotate(6 172 185)"/>
    <rect x="240" y="150" width="44" height="30" rx="3" transform="rotate(-4 262 165)"/>
    <rect x="95" y="220" width="44" height="30" rx="3" transform="rotate(10 117 235)"/>
    <rect x="190" y="225" width="44" height="30" rx="3" transform="rotate(-7 212 240)"/>
    <rect x="270" y="215" width="44" height="30" rx="3" transform="rotate(5 292 230)"/>
    <rect x="120" y="280" width="44" height="30" rx="3" transform="rotate(-3 142 295)"/>
    <rect x="210" y="285" width="44" height="30" rx="3" transform="rotate(8 232 300)"/>
  </g>
  <text x="92" y="174" font-size="9" fill="#3f5111" transform="rotate(-8 92 170)">final_v2</text>
  <text x="172" y="189" font-size="9" fill="#3f5111" transform="rotate(6 172 185)">final_REAL</text>
  <text x="262" y="169" font-size="9" fill="#3f5111" transform="rotate(-4 262 165)">copy(3)</text>
  <text x="117" y="239" font-size="9" fill="#3f5111" transform="rotate(10 117 235)">??.csv</text>

  <text x="195" y="352" text-anchor="middle" font-size="11" fill="#3f5111">No ACID · no schema · no time travel</text>
  <text x="195" y="370" text-anchor="middle" font-size="11" fill="#3f5111">“what did Q2 look like?” → silence</text>

  <!-- ===== LAKE PANEL ===== -->
  <rect x="400" y="80" width="330" height="310" rx="14" fill="#e8f1f8" stroke="#2563eb" stroke-width="2"/>
  <text x="565" y="110" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">🦴 Lake With a Spine</text>
  <text x="565" y="130" text-anchor="middle" font-size="11.5" font-style="italic" fill="#3551a4">same files, given a shape</text>

  <!-- ordered medallion mini-stack -->
  <rect x="455" y="150" width="220" height="46" rx="7" fill="#fde9c8" stroke="#d97706" stroke-width="1.8"/>
  <text x="565" y="178" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">🪨 Bronze — raw, immutable</text>

  <rect x="455" y="208" width="220" height="46" rx="7" fill="#e7eaee" stroke="#6b7280" stroke-width="1.8"/>
  <text x="565" y="236" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">🪙 Silver — cleaned, contract</text>

  <rect x="455" y="266" width="220" height="46" rx="7" fill="#fdedb8" stroke="#ca8a04" stroke-width="1.8"/>
  <text x="565" y="294" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">🏆 Gold — business-ready</text>

  <!-- arrows between -->
  <line x1="565" y1="196" x2="565" y2="207" stroke="#6b7280" stroke-width="1.6"/>
  <line x1="565" y1="254" x2="565" y2="265" stroke="#6b7280" stroke-width="1.6"/>

  <text x="565" y="352" text-anchor="middle" font-size="11" fill="#1e3a8a">ACID · schema evolution · time travel</text>
  <text x="565" y="370" text-anchor="middle" font-size="11" fill="#1e3a8a">“what did Q2 look like?” → one query</text>
</svg>
